apiVersion: apps/v1
kind: Deployment
metadata:
  name: romeo-operational-exporter
  labels:
    app.kubernetes.io/name: romeo
    app.kubernetes.io/component: operational-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: romeo
      app.kubernetes.io/component: operational-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: romeo
        app.kubernetes.io/component: operational-exporter
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: romeo/app:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["pnpm"]
          args:
            - monitoring:export
            - --
            - --listen
            - 0.0.0.0:9464
            - --base-url
            - http://romeo:3000
          env:
            - name: ROMEO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: romeo-monitoring-api-key
                  key: ROMEO_API_KEY
          ports:
            - name: metrics
              containerPort: 9464
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: romeo-operational-exporter
  labels:
    app.kubernetes.io/name: romeo
    app.kubernetes.io/component: operational-exporter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: romeo
    app.kubernetes.io/component: operational-exporter
  ports:
    - name: metrics
      port: 9464
      targetPort: metrics
