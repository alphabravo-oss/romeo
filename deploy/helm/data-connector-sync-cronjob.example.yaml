apiVersion: batch/v1
kind: CronJob
metadata:
  name: romeo-data-connector-sync
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: data-connector-sync
              image: romeo/ops:0.1.0
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: romeo-data-connector-sync
              command: ["/bin/sh", "-lc"]
              args:
                - |
                  set -eu
                  args="--once --max-connectors ${DATA_CONNECTOR_SYNC_MAX_CONNECTORS:-10}"
                  if [ -n "${DATA_CONNECTOR_SYNC_WORKSPACE_ID:-}" ]; then
                    args="$args --workspace ${DATA_CONNECTOR_SYNC_WORKSPACE_ID}"
                  fi
                  pnpm --filter @romeo/cli start -- workers data-connector-sync $args
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
