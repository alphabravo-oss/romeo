apiVersion: batch/v1
kind: CronJob
metadata:
  name: romeo-knowledge-extraction
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: knowledge-extraction
              image: romeo/ops:0.1.0
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: romeo-knowledge-extraction
              command: ["/bin/sh", "-lc"]
              args:
                - |
                  set -eu
                  args="--kb ${KNOWLEDGE_EXTRACTION_KB_ID} --once --max-sources ${KNOWLEDGE_EXTRACTION_MAX_SOURCES:-10}"
                  pnpm --filter @romeo/cli start -- workers knowledge-extraction $args
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
