{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "romeo.fullname" . }}-migrate
  labels:
    {{- include "romeo.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    {{- if .Values.migration.useHelmHook }}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- end }}
    {{- with .Values.migration.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "romeo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "romeo.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "romeo.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["pnpm", "migrate:postgres"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "romeo.configMapName" . }}
            {{- if or .Values.secrets.existingSecret .Values.secrets.create }}
            - secretRef:
                name: {{ include "romeo.secretName" . }}
            {{- end }}
          env:
            {{- include "romeo.nodeWritableEnv" . | nindent 12 }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "romeo.databaseUrlSecretName" . }}
                  key: {{ include "romeo.databaseUrlSecretKey" . }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
{{- end }}
