{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "romeo.serviceAccountName" . }}
  labels:
    {{- include "romeo.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- if and .Values.serviceAccount.create .Values.workers.serviceAccount.create }}
---
{{- end }}
{{- if .Values.workers.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "romeo.workerServiceAccountName" . }}
  labels:
    {{- include "romeo.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  {{- with .Values.workers.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.workers.serviceAccount.automountServiceAccountToken }}
{{- end }}
