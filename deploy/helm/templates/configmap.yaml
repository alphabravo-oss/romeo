apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "romeo.configMapName" . }}
  labels:
    {{- include "romeo.labels" . | nindent 4 }}
data:
  {{- $sensitive := include "romeo.sensitiveEnvKeys" . | fromJsonArray }}
  {{- range $key, $value := .Values.env }}
  {{- if not (has $key $sensitive) }}
  {{ $key }}: {{ $value | toString | quote }}
  {{- end }}
  {{- end }}
  PORT: {{ .Values.service.port | toString | quote }}
  {{- if .Values.otel.endpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  {{- end }}
