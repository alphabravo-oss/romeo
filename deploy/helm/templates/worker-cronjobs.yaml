{{- if .Values.workers.dataConnectorSync.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "romeo.fullname" . }}-data-connector-sync
  labels:
    {{- include "romeo.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-connector-sync
spec:
  schedule: {{ .Values.workers.dataConnectorSync.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            {{- include "romeo.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: data-connector-sync
        spec:
          restartPolicy: Never
          serviceAccountName: {{ include "romeo.workerServiceAccountName" . }}
          securityContext:
            {{- toYaml .Values.workers.podSecurityContext | nindent 12 }}
          containers:
            - name: data-connector-sync
              image: {{ include "romeo.workerImage" . | quote }}
              imagePullPolicy: {{ include "romeo.workerPullPolicy" . }}
              command: ["/bin/sh", "-lc"]
              args:
                - |
                  set -eu
                  args="--once --max-connectors ${DATA_CONNECTOR_SYNC_MAX_CONNECTORS:-10}"
                  if [ -n "${DATA_CONNECTOR_SYNC_WORKSPACE_ID:-}" ]; then
                    args="$args --workspace ${DATA_CONNECTOR_SYNC_WORKSPACE_ID}"
                  fi
                  pnpm --filter @romeo/cli start -- workers data-connector-sync $args
              env:
                {{- include "romeo.workerBaseEnv" . | nindent 16 }}
                - name: DATA_CONNECTOR_SYNC_MAX_CONNECTORS
                  value: {{ .Values.workers.dataConnectorSync.maxConnectors | quote }}
                - name: DATA_CONNECTOR_SYNC_WORKSPACE_ID
                  value: {{ .Values.workers.dataConnectorSync.workspaceId | quote }}
              securityContext:
                {{- toYaml .Values.workers.securityContext | nindent 16 }}
              resources:
                {{- toYaml .Values.workers.dataConnectorSync.resources | nindent 16 }}
{{- end }}
