{{- if .Values.workers.toolDispatch.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "romeo.fullname" . }}-tool-dispatch
  labels:
    {{- include "romeo.labels" . | nindent 4 }}
    app.kubernetes.io/component: tool-dispatch
spec:
  schedule: {{ .Values.workers.toolDispatch.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 900
      template:
        metadata:
          labels:
            {{- include "romeo.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: tool-dispatch
        spec:
          restartPolicy: Never
          serviceAccountName: {{ include "romeo.workerServiceAccountName" . }}
          securityContext:
            {{- toYaml .Values.workers.podSecurityContext | nindent 12 }}
          containers:
            - name: tool-dispatch
              image: {{ include "romeo.workerImage" . | quote }}
              imagePullPolicy: {{ include "romeo.workerPullPolicy" . }}
              command: ["/bin/sh", "-lc"]
              args:
                - |
                  set -eu
                  args="--once --max-jobs ${TOOL_DISPATCH_MAX_JOBS:-10} --lease-seconds ${TOOL_DISPATCH_LEASE_SECONDS:-300} --timeout-ms ${TOOL_DISPATCH_TIMEOUT_MS:-10000} --max-bytes ${TOOL_DISPATCH_MAX_BYTES:-1000000}"
                  args="$args --secret-resolver ${TOOL_DISPATCH_SECRET_RESOLVER_DRIVER:-disabled}"
                  payload="/var/run/romeo-tool-dispatch/${TOOL_DISPATCH_PAYLOAD_KEY:-payloads.json}"
                  if [ -f "$payload" ]; then
                    args="$args --payload-file $payload"
                  fi
                  if [ "${TOOL_DISPATCH_ALLOW_PRIVATE_NETWORK:-false}" = "true" ]; then
                    args="$args --allow-private-network"
                  fi
                  pnpm --filter @romeo/cli start -- workers tool-dispatch $args
              env:
                {{- include "romeo.workerBaseEnv" . | nindent 16 }}
                - name: TOOL_DISPATCH_MAX_JOBS
                  value: {{ .Values.workers.toolDispatch.maxJobs | quote }}
                - name: TOOL_DISPATCH_LEASE_SECONDS
                  value: {{ .Values.workers.toolDispatch.leaseSeconds | quote }}
                - name: TOOL_DISPATCH_TIMEOUT_MS
                  value: {{ .Values.workers.toolDispatch.timeoutMs | quote }}
                - name: TOOL_DISPATCH_MAX_BYTES
                  value: {{ .Values.workers.toolDispatch.maxBytes | quote }}
                - name: TOOL_DISPATCH_ALLOW_PRIVATE_NETWORK
                  value: {{ .Values.workers.toolDispatch.allowPrivateNetwork | quote }}
                - name: TOOL_DISPATCH_SECRET_RESOLVER_DRIVER
                  value: {{ .Values.workers.toolDispatch.secretResolverDriver | quote }}
                - name: TOOL_DISPATCH_PAYLOAD_KEY
                  value: {{ .Values.workers.toolDispatch.payloadSecret.key | quote }}
                - name: VAULT_ADDR
                  value: {{ .Values.env.VAULT_ADDR | quote }}
                - name: VAULT_NAMESPACE
                  value: {{ .Values.env.VAULT_NAMESPACE | quote }}
                - name: VAULT_KV_MOUNT
                  value: {{ .Values.env.VAULT_KV_MOUNT | quote }}
                - name: VAULT_TIMEOUT_MS
                  value: {{ .Values.env.VAULT_TIMEOUT_MS | quote }}
                - name: AWS_REGION
                  value: {{ .Values.env.AWS_REGION | quote }}
                - name: AWS_SECRET_MANAGER_TIMEOUT_MS
                  value: {{ .Values.env.AWS_SECRET_MANAGER_TIMEOUT_MS | quote }}
                - name: GCP_SECRET_MANAGER_PROJECT
                  value: {{ .Values.env.GCP_SECRET_MANAGER_PROJECT | quote }}
                - name: GCP_SECRET_MANAGER_TIMEOUT_MS
                  value: {{ .Values.env.GCP_SECRET_MANAGER_TIMEOUT_MS | quote }}
                - name: AZURE_KEY_VAULT_URL
                  value: {{ .Values.env.AZURE_KEY_VAULT_URL | quote }}
                - name: AZURE_KEY_VAULT_TIMEOUT_MS
                  value: {{ .Values.env.AZURE_KEY_VAULT_TIMEOUT_MS | quote }}
                {{- if or .Values.secrets.existingSecret .Values.secrets.create }}
                - name: VAULT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "romeo.secretName" . }}
                      key: VAULT_TOKEN
                      optional: true
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "romeo.secretName" . }}
                      key: AWS_ACCESS_KEY_ID
                      optional: true
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "romeo.secretName" . }}
                      key: AWS_SECRET_ACCESS_KEY
                      optional: true
                - name: AWS_SESSION_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "romeo.secretName" . }}
                      key: AWS_SESSION_TOKEN
                      optional: true
                - name: GCP_ACCESS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "romeo.secretName" . }}
                      key: GCP_ACCESS_TOKEN
                      optional: true
                - name: AZURE_ACCESS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "romeo.secretName" . }}
                      key: AZURE_ACCESS_TOKEN
                      optional: true
                {{- end }}
              securityContext:
                {{- toYaml .Values.workers.securityContext | nindent 16 }}
              {{- if .Values.workers.toolDispatch.payloadSecret.name }}
              volumeMounts:
                - name: tool-dispatch-payloads
                  mountPath: /var/run/romeo-tool-dispatch
                  readOnly: true
              {{- end }}
              resources:
                {{- toYaml .Values.workers.toolDispatch.resources | nindent 16 }}
          {{- if .Values.workers.toolDispatch.payloadSecret.name }}
          volumes:
            - name: tool-dispatch-payloads
              secret:
                secretName: {{ .Values.workers.toolDispatch.payloadSecret.name | quote }}
                items:
                  - key: {{ .Values.workers.toolDispatch.payloadSecret.key | quote }}
                    path: {{ .Values.workers.toolDispatch.payloadSecret.key | quote }}
          {{- end }}
{{- end }}
