apiVersion: batch/v1
kind: CronJob
metadata:
  name: romeo-voice-catalog-sync
spec:
  schedule: "0 */12 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: voice-catalog-sync
              image: romeo/ops:0.1.0
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: romeo-voice-catalog-sync
              command: ["/bin/sh", "-lc"]
              args:
                - |
                  set -eu
                  pnpm --filter @romeo/cli start -- workers voice-catalog-sync --once
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
