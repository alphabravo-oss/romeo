apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: romeo-pg
spec:
  instances: 3
  imageName: registry.example.com/romeo/postgresql-pgvector:18
  storage:
    size: 100Gi
  walStorage:
    size: 20Gi
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
  bootstrap:
    initdb:
      database: romeo
      owner: romeo
      dataChecksums: true
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 512MB
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: romeo-pg-backups
