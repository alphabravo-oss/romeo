apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: romeo-pg-backups
spec:
  retentionPolicy: "30d"
  configuration:
    destinationPath: s3://romeo-postgres-backups/romeo-pg
    endpointURL: https://s3.example.com
    s3Credentials:
      accessKeyId:
        name: romeo-pg-backup-s3
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: romeo-pg-backup-s3
        key: ACCESS_SECRET_KEY
      region:
        name: romeo-pg-backup-s3
        key: AWS_REGION
    wal:
      compression: gzip
      encryption: AES256
      maxParallel: 4
    data:
      compression: gzip
      encryption: AES256
      jobs: 2
